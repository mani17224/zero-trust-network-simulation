# WireGuard Configuration — Service Node (10.0.0.2)
# Role: Hosts microservices (service-a, service-b, service-c)
# Generated by setup_wireguard.sh

[Interface]
# Service Node private key (generated by setup_wireguard.sh)
PrivateKey = SERVICE_NODE_PRIVATE_KEY_PLACEHOLDER
# VPN interface IP address
Address = 10.0.0.2/24
# WireGuard listening port
ListenPort = 51820
# Only route VPN-destined traffic through this interface
DNS = 10.0.0.1

# Block all non-VPN traffic to service ports
PostUp   = iptables -A INPUT -i wg0 -j ACCEPT; iptables -A INPUT -p tcp --dport 8001 -i eth0 -j DROP; iptables -A INPUT -p tcp --dport 8002 -i eth0 -j DROP; iptables -A INPUT -p tcp --dport 8003 -i eth0 -j DROP; iptables -A INPUT -p udp --dport 51820 -j ACCEPT
PostDown = iptables -D INPUT -i wg0 -j ACCEPT; iptables -D INPUT -p tcp --dport 8001 -i eth0 -j DROP; iptables -D INPUT -p tcp --dport 8002 -i eth0 -j DROP; iptables -D INPUT -p tcp --dport 8003 -i eth0 -j DROP; iptables -D INPUT -p udp --dport 51820 -j ACCEPT

# ─── Peer: Gateway Node (10.0.0.1) ────────────────────────────────────────────
[Peer]
# Gateway public key
PublicKey = GATEWAY_PUBLIC_KEY_PLACEHOLDER
# Route all traffic through gateway
AllowedIPs = 10.0.0.0/24
# Gateway endpoint (replace with actual IP or hostname)
Endpoint = GATEWAY_HOST:51820
PersistentKeepalive = 25
