# WireGuard Configuration — Gateway Node (10.0.0.1)
# Role: Central hub for all VPN traffic
# Generated by setup_wireguard.sh

[Interface]
# Gateway private key (generated by setup_wireguard.sh)
PrivateKey = GATEWAY_PRIVATE_KEY_PLACEHOLDER
# VPN interface IP address
Address = 10.0.0.1/24
# WireGuard listening port
ListenPort = 51820
# DNS resolver within VPN
DNS = 10.0.0.1

# iptables rules: allow VPN traffic, block all other inter-node traffic
PostUp   = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE; iptables -A INPUT -p udp --dport 51820 -j ACCEPT
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE; iptables -D INPUT -p udp --dport 51820 -j ACCEPT

# ─── Peer: Service Node (10.0.0.2) ────────────────────────────────────────────
[Peer]
# Service Node public key (generated by setup_wireguard.sh)
PublicKey = SERVICE_NODE_PUBLIC_KEY_PLACEHOLDER
# Allow traffic from Service Node's VPN IP
AllowedIPs = 10.0.0.2/32
# Service Node endpoint (replace with actual IP or hostname)
Endpoint = SERVICE_NODE_HOST:51820
# Keep NAT alive
PersistentKeepalive = 25

# ─── Peer: Client Node (10.0.0.3) ─────────────────────────────────────────────
[Peer]
# Client Node public key (generated by setup_wireguard.sh)
PublicKey = CLIENT_NODE_PUBLIC_KEY_PLACEHOLDER
# Allow traffic from Client Node's VPN IP
AllowedIPs = 10.0.0.3/32
# Client Node endpoint (replace with actual IP or hostname)
Endpoint = CLIENT_NODE_HOST:51820
PersistentKeepalive = 25
