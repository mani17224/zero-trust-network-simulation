# WireGuard Configuration — Client Node (10.0.0.3)
# Role: Client that initiates requests through the gateway
# Generated by setup_wireguard.sh

[Interface]
# Client Node private key (generated by setup_wireguard.sh)
PrivateKey = CLIENT_NODE_PRIVATE_KEY_PLACEHOLDER
# VPN interface IP address
Address = 10.0.0.3/24
# Route only VPN traffic through WireGuard (split tunnel)
DNS = 10.0.0.1

# Allow VPN interface, restrict external traffic
PostUp   = iptables -A INPUT -i wg0 -j ACCEPT; iptables -A INPUT -p udp --dport 51820 -j ACCEPT
PostDown = iptables -D INPUT -i wg0 -j ACCEPT; iptables -D INPUT -p udp --dport 51820 -j ACCEPT

# ─── Peer: Gateway Node (10.0.0.1) ────────────────────────────────────────────
[Peer]
# Gateway public key
PublicKey = GATEWAY_PUBLIC_KEY_PLACEHOLDER
# Only route VPN subnet through this tunnel (split tunnel)
AllowedIPs = 10.0.0.0/24
# Gateway endpoint (replace with actual IP or hostname)
Endpoint = GATEWAY_HOST:51820
PersistentKeepalive = 25
